    namespace: nected-rest
    description: REST adapter for Nected API.
    resources:
    - path: /nected/rule/{ruleId}
      name: triggerrule
      operations:
      - method: POST
        name: triggerrule
        description: Trigger a rule
        call: nected.triggerrule
        with:
          ruleId: rest.ruleId
        outputParameters:
        - type: object
          mapping: $.
    - path: /nected/workflow/{workflowId}
