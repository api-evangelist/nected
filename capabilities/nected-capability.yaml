naftiko: 1.0.0-alpha2
info:
  label: Nected API
  description: Nected is a low-code workflow automation and decision engine platform. The API enables triggering of rules
    and workflows, listing and inspecting entities, managing global variables, retrieving audit logs, and checking usage.
  tags:
  - Nected
  - API
  created: '2026-05-06'
  modified: '2026-05-06'
capability:
  consumes:
  - type: http
    namespace: nected
    baseUri: https://api.nected.ai
    description: Nected API HTTP API.
    authentication:
      type: apikey
      in: header
      name: nected-api-key
      value: '{{NECTED_TOKEN}}'
    resources:
    - name: nected-rule-ruleid
      path: /nected/rule/{ruleId}
      operations:
      - name: triggerrule
        method: POST
        description: Trigger a rule
        inputParameters:
        - name: ruleId
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: nected-workflow-workflowid
      path: /nected/workflow/{workflowId}
      operations:
      - name: triggerworkflow
        method: POST
        description: Trigger a workflow
        inputParameters:
        - name: workflowId
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: dev-usage
      path: /dev/usage
      operations:
      - name: checkusage
        method: GET
        description: Check usage
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: dev-audit-audit-search
      path: /dev/audit/audit/search
      operations:
      - name: searchauditlogs
        method: GET
        description: Search audit logs
        inputParameters:
        - name: pageNo
          in: query
          type: integer
        - name: pageSize
          in: query
          type: integer
        - name: search
          in: query
          type: string
        - name: type
          in: query
          type: string
        - name: event
          in: query
          type: string
        - name: status
          in: query
          type: string
        - name: startDate
          in: query
          type: string
        - name: endDate
          in: query
          type: string
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: dev-audit-audit-logid
      path: /dev/audit/audit/{logId}
      operations:
      - name: getauditlog
        method: GET
        description: Get audit log detail
        inputParameters:
        - name: logId
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: dev-entitytype
      path: /dev/{entityType}
      operations:
      - name: listentities
        method: GET
        description: List rules or workflows
        inputParameters:
        - name: entityType
          in: path
          type: string
          required: true
        - name: page
          in: query
          type: integer
        - name: perPage
          in: query
          type: integer
        - name: sortBy
          in: query
          type: string
        - name: sortDir
          in: query
          type: string
        - name: status
          in: query
          type: string
        - name: name
          in: query
          type: string
        - name: type
          in: query
          type: string
        - name: q
          in: query
          type: string
        - name: tags
          in: query
          type: string
        - name: createdAtFrom
          in: query
          type: string
        - name: createdAtTo
          in: query
          type: string
        - name: updatedAtFrom
          in: query
          type: string
        - name: updatedAtTo
          in: query
          type: string
        - name: createdBy
          in: query
          type: string
        - name: updatedBy
          in: query
          type: string
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: dev-entitytype-entityid
      path: /dev/{entityType}/{entityId}
      operations:
      - name: getentity
        method: GET
        description: Get rule or workflow detail
        inputParameters:
        - name: entityType
          in: path
          type: string
          required: true
        - name: entityId
          in: path
          type: string
          required: true
        - name: view
          in: query
          type: string
        - name: include
          in: query
          type: string
        - name: version
          in: query
          type: string
        - name: expand
          in: query
          type: string
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: dev-variable
      path: /dev/variable
      operations:
      - name: listglobalvariables
        method: GET
        description: List global variables
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createglobalvariable
        method: POST
        description: Create a global variable
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: dev-variable-name
      path: /dev/variable/{name}
      operations:
      - name: getglobalvariable
        method: GET
        description: Get a global variable
        inputParameters:
        - name: name
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updateglobalvariable
        method: PATCH
        description: Update a global variable
        inputParameters:
        - name: name
          in: path
          type: string
          required: true
        - name: checksum
          in: header
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deleteglobalvariable
        method: DELETE
        description: Delete a global variable
        inputParameters:
        - name: name
          in: path
          type: string
          required: true
        - name: checksum
          in: header
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
